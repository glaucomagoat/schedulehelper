[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"
  # sed replacements inject env var values into index.html at deploy time.
  # Set STORAGE_SECRET, DEV_USERNAME, DEV_PASSWORD, CVE_USER, CVE_PASS in Netlify dashboard.
  command = "npm install && sed -i 's/__STORAGE_SECRET__/'\"$STORAGE_SECRET\"'/g; s/__DEV_USERNAME__/'\"$DEV_USERNAME\"'/g; s/__DEV_PASSWORD__/'\"$DEV_PASSWORD\"'/g; s/__CVE_USER__/'\"$CVE_USER\"'/g; s/__CVE_PASS__/'\"$CVE_PASS\"'/g' index.html"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[functions]
  node_bundler = "esbuild"

[functions."storage-proxy"]
  timeout = 10

# Route /.netlify/functions/claude-proxy to the Edge Function instead of
# the serverless function. Edge Functions support true response streaming,
# which is required for AI schedule generation to work without timeouts.
# The old netlify/functions/claude-proxy.mjs is kept but no longer used.
[[edge_functions]]
  path = "/.netlify/functions/claude-proxy"
  function = "claude-proxy"
